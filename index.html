<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clone</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/webp" href="logo.webp">
</head>
<body>

<header>
  <div class="header-left">
    <button class="icon-btn" id="hamburgerBtn" aria-label="Menu">
      <svg viewBox="0 0 24 24"><path d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/></svg>
    </button>
    <a href="#" class="logo" id="logoBtn">
      <span class="play-badge"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></span>
      Clone
    </a>
  </div>

  <div class="header-center">
    <form class="search-form" id="searchForm">
      <input type="text" id="searchInput" placeholder="Search" autocomplete="off">
      <button type="submit" class="search-btn"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 5L20.49 19zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14"/></svg></button>
    </form>
    <button class="mic-btn" aria-label="Search with voice">
      <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11z"/></svg>
    </button>
  </div>

  <div class="header-right">
    <button class="icon-btn mobile-search-toggle" id="mobileSearchBtn" aria-label="Search">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 5L20.49 19zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14"/></svg>
    </button>
    <button class="theme-toggle" id="themeToggle">
      <svg id="themeIcon" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
      <span id="themeLabel">Dark</span>
    </button>
    <button class="icon-btn" aria-label="Create">
      <svg viewBox="0 0 24 24"><path d="M14.94 4.66h-4.5v4.5h-4.5v4.5h4.5v4.5h4.5v-4.5h4.5v-4.5h-4.5z" transform="rotate(0)"/><path d="M11 4h2v16h-2z"/><path d="M4 11h16v2H4z"/></svg>
    </button>
    <button class="icon-btn" aria-label="Notifications">
      <svg viewBox="0 0 24 24"><path d="M12 22a2.4 2.4 0 0 0 2.4-2.4h-4.8A2.4 2.4 0 0 0 12 22zm7.2-6v-5.4c0-3.5-1.86-6.43-5.1-7.2v-.78a2.1 2.1 0 1 0-4.2 0v.78c-3.24.77-5.1 3.7-5.1 7.2V16l-2.1 2.1v1.08h18.6V18.1z"/></svg>
    </button>
    <div class="avatar"><img src="https://ui-avatars.com/api/?name=P+K&background=FF0000&color=fff&bold=true" alt="avatar"></div>
  </div>
</header>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-section">
    <a href="#" class="side-item active" data-page="home">
      <svg viewBox="0 0 24 24"><path d="M12 3 2 11h3v9h6v-6h2v6h6v-9h3z"/></svg>
      <span class="label">Home</span>
    </a>
    <a href="#" class="side-item">
      <svg viewBox="0 0 24 24"><path d="M17 10.5V6a1 1 0 0 0-1.5-.87L12 7.4V6a1 1 0 0 0-1-1H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h7a1 1 0 0 0 1-1v-1.4l3.5 2.27A1 1 0 0 0 17 18v-4.5l4 2.7v-8.4z"/></svg>
      <span class="label">Shorts</span>
    </a>
    <a href="#" class="side-item">
      <svg viewBox="0 0 24 24"><path d="M10 18v-6l5 3zm11-13.5v15a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 19.5v-15A1.5 1.5 0 0 1 4.5 3h15A1.5 1.5 0 0 1 21 4.5z"/></svg>
      <span class="label">Subscriptions</span>
    </a>
  </div>

  <div class="sidebar-section">
    <div class="section-title">You</div>
    <a href="#" class="side-item">
      <svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 0 0-9 9H1l4 4 4-4H6a7 7 0 1 1 2 4.9l-1.4 1.4A9 9 0 1 0 13 3z"/></svg>
      <span class="label">History</span>
    </a>
    <a href="#" class="side-item">
      <svg viewBox="0 0 24 24"><path d="M10 8v8l6-4zM4 4h16v16H4z" fill="none"/><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm-9.5 13V7l6 5z"/></svg>
      <span class="label">Your videos</span>
    </a>
    <a href="#" class="side-item">
      <svg viewBox="0 0 24 24"><path d="M12 2a4.5 4.5 0 0 0-4.5 4.5c0 1.58.8 2.97 2 3.8-2.9.98-5 3.68-5 6.95V19h15v-1.75c0-3.27-2.1-5.97-5-6.95a4.49 4.49 0 0 0 2-3.8A4.5 4.5 0 0 0 12 2z"/></svg>
      <span class="label">Watch later</span>
    </a>
    <a href="#" class="side-item">
      <svg viewBox="0 0 24 24"><path d="M12 21s-6.7-4.35-9.3-8.1C.6 9.9 1.6 6.3 4.7 5.1c1.9-.75 4 .05 5.3 1.85 1.3-1.8 3.4-2.6 5.3-1.85 3.1 1.2 4.1 4.8 2 7.8C18.7 16.65 12 21 12 21z"/></svg>
      <span class="label">Liked videos</span>
    </a>
  </div>

  <div class="sidebar-section" id="subsSection"></div>

  <div class="sidebar-section">
    <div class="section-title">Explore</div>
    <div id="exploreList"></div>
  </div>
</aside>

<main id="mainContent">

  <section id="homeView">
    <div class="chips-row" id="chipsRow"></div>
    <div class="video-grid" id="videoGrid"></div>
  </section>

  <section id="watchView">
    <button class="back-btn" id="backBtn">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20z"/></svg>
      Back to home
    </button>
    <div class="watch-layout">
      <div class="watch-main">
        <div class="player">
          <img id="playerImg" src="" alt="video">
          <div class="player-overlay">
            <button id="playPauseBtn">
              <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </button>
          </div>
          <div class="player-controls">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <div class="progress-bar"><span></span></div>
            <svg viewBox="0 0 24 24"><path d="M3 9h4l5-5v16l-5-5H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05A4.48 4.48 0 0 0 16.5 12z"/></svg>
            <svg viewBox="0 0 24 24"><path d="M14 14H5v2h9v3l4-4-4-4z"/></svg>
          </div>
        </div>

        <h1 class="watch-title" id="watchTitle"></h1>

        <div class="watch-actions">
          <div class="channel-row">
            <div class="ch-avatar"><img id="watchChAvatar" src="" alt=""></div>
            <div>
              <div class="channel-name-lg" id="watchChName"></div>
              <div class="channel-subs" id="watchChSubs"></div>
            </div>
            <button class="subscribe-btn" id="subscribeBtn">Subscribe</button>
          </div>
          <div class="action-group">
            <div class="pill" id="likeBtn">
              <svg viewBox="0 0 24 24"><path d="M1 21h4V9H1zm22-11a2 2 0 0 0-2-2h-6.31l.95-4.57.03-.32a1.5 1.5 0 0 0-.44-1.06L14.17 1 7.59 7.59A2 2 0 0 0 7 9v10a2 2 0 0 0 2 2h9a2 2 0 0 0 1.84-1.21l3.02-7.05c.09-.23.14-.47.14-.74z"/></svg>
              <span id="likeCount">0</span>
            </div>
            <div class="pill" id="dislikeBtn">
              <svg viewBox="0 0 24 24" style="transform:scaleX(-1) scaleY(-1)"><path d="M1 21h4V9H1zm22-11a2 2 0 0 0-2-2h-6.31l.95-4.57.03-.32a1.5 1.5 0 0 0-.44-1.06L14.17 1 7.59 7.59A2 2 0 0 0 7 9v10a2 2 0 0 0 2 2h9a2 2 0 0 0 1.84-1.21l3.02-7.05c.09-.23.14-.47.14-.74z"/></svg>
            </div>
            <div class="pill"><svg viewBox="0 0 24 24"><path d="M18 16.08a2.9 2.9 0 0 0-1.96.77L8.91 12.7a2.9 2.9 0 0 0 0-1.4l7.05-4.11a3 3 0 1 0-.9-2.13c0 .24.03.47.08.7L8.08 9.87a3 3 0 1 0 0 4.26l7.13 4.15c-.05.21-.08.43-.08.66a2.92 2.92 0 1 0 2.87-2.86z"/></svg>Share</div>
            <div class="pill"><svg viewBox="0 0 24 24"><path d="M14 10V4l-1.5-1.5L4 11v2h2l7.5 7.5L15 19v-6l4-4z"/></svg>Download</div>
            <div class="pill"><svg viewBox="0 0 24 24"><path d="M4 4h16v2H4zm0 7h16v2H4zm0 7h10v2H4z"/></svg>Save</div>
          </div>
        </div>

        <div class="description-box">
          <div class="views-date" id="watchMeta"></div>
          <div id="watchDesc"></div>
        </div>

        <div class="comments-section">
          <div class="comments-header" id="commentsCount">Comments</div>
          <div class="comment-input-row">
            <div class="ch-avatar"><img src="https://ui-avatars.com/api/?name=P+K&background=FF0000&color=fff&bold=true" alt=""></div>
            <input type="text" id="commentInput" placeholder="Add a comment...">
          </div>
          <div id="commentsList"></div>
        </div>
      </div>

      <div class="watch-sidebar" id="relatedList"></div>
    </div>
  </section>

</main>
<script src="script.js"></script>
</body>
</html>
